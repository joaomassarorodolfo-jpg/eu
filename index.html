<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <title>Davi Nunes Wudarski</title>
    <link rel="stylesheet" href="style.css">
</head>

                <img class="estudante-icone" src="img/instagram.png" alt="Instagram">
                <img class="estudante-icone" src="img/facebook.png" alt="Facebook">
            </div>

            <div class="estudante-div">
                <img class="estudante-imagem" src="img/apoti.jpg" alt="Apoti">

                <img class="estudante-icone" src="img/facebook.png alt="Facebook">
            </div>

            <div class="estudante-div">
                <img class="estudante-imagem" src="img/joao.png" alt="João">
                <h3 class="estudante-nome">Massaru</h3>

                <img class="estudante-icone" src="img/instagram.png alt="Instagram">
                <img class="estudante-icone" src="img/facebook.png" alt="Facebook">
            </div>

            <div class="estudante-div">
                <img class="estudante-imagem" src="img/ruan.png" alt="Ruan">
                <h3 class="estudante-nome">Ruan</h3>

                <img class="estudante-icone" src="img/instagram.png" alt="Instagram">
                <img class="estudante-icone" src="img/facebook.png" alt="Facebook">
            </div>

        </div>
    </section>

    <footer class="escola">
        <img class="logo_rodape" src="img/" alt="Logo">

        <h2 class="escola-titulo">
            Mais informações entre em contato
        </h2>
    </footer>
